on:
  push:
    branches:
      - distribute
      - macos
      - macos-x86_64

name: Build MacOS x86_64
jobs:
  build:
    name: Build MacOS x86_64
    runs-on: macos-15-intel
    steps:
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2.8.1
        with:
          key: ${{ secrets.GH_USER_SCP_KEY }}
          name: id_ed25519
          known_hosts: ${{ secrets.KNOWN_HOSTS }}
          if_key_exists: replace
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            ~/.stack
            ~/.ghcup/macos-x86_64
            .stack-work
          key: ${{ runner.os }}-x86_64-${{ hashFiles('stack.yaml.lock', 'elm-dev.cabal') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-
      - run: echo "${HOME}/.local/bin" >> $GITHUB_PATH
      - name: Run distribution script
        run: |
          mkdir -p ~/.local/bin
          curl https://downloads.haskell.org/~ghcup/x86_64-apple-darwin-ghcup -o ~/.local/bin/ghcup && chmod a+x ~/.local/bin/ghcup
          cd distribution
          ./build-macos-x86_64.sh
